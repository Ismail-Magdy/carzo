name: carzo
description: "A new Flutter project."

publish_to: "none"

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  dio: ^5.9.2
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
  json_annotation: ^4.11.0
  get_it: ^9.2.1
  animated_text_kit: ^4.3.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  device_preview: ^1.3.1
  file_picker: ^10.3.10
  flutter_bloc: ^9.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_offline: ^6.0.0
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  google_generative_ai: ^0.4.7
  http_parser: ^4.1.2
  image_picker: ^1.2.1
  logger: ^2.6.2
  mime_type: ^1.0.1
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.9.2
  retrofit_generator: ^10.2.3
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon-launcher.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/play-store-icon-launcher.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/images/photos/
    - assets/images/master/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
